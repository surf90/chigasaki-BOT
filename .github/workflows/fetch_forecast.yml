name: Fetch JMA Forecast

on:
  schedule:
    # JST 5:05, 11:05, 17:05 -> UTC 20:05, 2:05, 8:05
    - cron: '5 20,2,8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run fetch script
        run: python scripts/fetch_forecast.py
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/forecast_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update forecast data" && git push)
